# LandMap - development stack with hot reload.
#
# Standalone (not an override). Start with:  make dev
#   Frontend (Vite): http://localhost:5173   (proxies /api to the backend)
#   Backend  (API):  http://localhost:8000/api/docs
#
# Source is bind-mounted, so edits reload instantly without rebuilding images.

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-landmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landmap}
      POSTGRES_DB: ${POSTGRES_DB:-landmap}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-landmap}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: test
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://localhost:8000
      LOG_LEVEL: debug
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: /api
      VITE_DEV_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata_dev:
  frontend_node_modules:
