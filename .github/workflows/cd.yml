name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: prod
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/landmap-backend:latest,${{ secrets.DOCKER_HUB_USERNAME }}/landmap-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: prod
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/landmap-frontend:latest,${{ secrets.DOCKER_HUB_USERNAME }}/landmap-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && ${{ secrets.SSH_HOST != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/landmap
            git pull origin main
            docker compose pull
            docker compose up -d
            docker image prune -f